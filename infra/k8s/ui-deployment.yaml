apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatdft-ui
  namespace: chatdft
  labels:
    app: chatdft-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatdft-ui
  template:
    metadata:
      labels:
        app: chatdft-ui
    spec:
      containers:
        - name: ui
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/chatdft-ui:latest
          command:
            - streamlit
            - run
            - client/app.py
            - --server.port=8501
            - --server.address=0.0.0.0
          ports:
            - containerPort: 8501
          env:
            - name: CHATDFT_BACKEND
              value: "http://chatdft-server:8000"
          resources:
            requests:
              cpu: 125m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 30
